<ng-container [ngTemplateOutlet]="mytemplate"
    [ngTemplateOutletContext]="{details:{header2:'Your Trusted IT Partner in Tumkur',
    paragraph:'Based in Tumkur, we are a team of dedicated IT professionals committed to delivering high-quality services. Our mission is to help businesses thrive in today’s digital era with reliable and innovative IT solutions.'}}">
    </ng-container>

<div class="img">
    <img src="images/common-images/company-image.jpg" alt="">
</div>

<ng-container [ngTemplateOutlet]="mytemplate"
    [ngTemplateOutletContext]="{details:{class:'l1',marker:'dot',header:'Serving Industries Across Tumakuru',
     list:['Manufacturing Units','Educational Institutions','Healthcare Facilities','Retail Businesses','Professional Services','Small & Medium Enterprises']}}"></ng-container>

<ng-container [ngTemplateOutlet]="mytemplate" [ngTemplateOutletContext]="{details:{class:'l2',marker:'dot',header:'Our Service Areas in Tumakuru Region',
    list:['Tumkur City','Sira','Gubbi','Tiptur','Kunigal','Surrounding Industrial Areas']}}"></ng-container>

<ng-container [ngTemplateOutlet]="mytemplate"
    [ngTemplateOutletContext]="{details:{class:'l3', marker:'tick',header2  :'Why Partner with Us for Your IT Needs?',header:'Local Expertise',
    list:['Understanding of local business environment','Bilingual support team: 24/7 technical support in Kannada and English','Regular client visits']}}"></ng-container>



<ng-template #mytemplate let-details="details">
    <section class="{{details.class}}" class="about">
        <h2>{{details.header2}}</h2>
        <P>{{details.paragraph}}</P>
        <h3>{{details.header}}</h3>
        <ul>

            <li *ngFor="let item of details.list">
                <span class="point1" *ngIf="details.marker=='dot'"> <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960"
                        width="24px" fill="#78A75A">
                        <path
                            d="M480-280q83 0 141.5-58.5T680-480q0-83-58.5-141.5T480-680q-83 0-141.5 58.5T280-480q0 83 58.5 141.5T480-280Zm0 200q-83 0-156-31.5T197-197q-54-54-85.5-127T80-480q0-83 31.5-156T197-763q54-54 127-85.5T480-880q83 0 156 31.5T763-763q54 54 85.5 127T880-480q0 83-31.5 156T763-197q-54 54-127 85.5T480-80Zm0-80q134 0 227-93t93-227q0-134-93-227t-227-93q-134 0-227 93t-93 227q0 134 93 227t227 93Zm0-320Z" />
                    </svg></span>
                    <span class="point2" *ngIf="details.marker=='tick'">
                        <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#78A75A"><path d="M382-240 154-468l57-57 171 171 367-367 57 57-424 424Z"/></svg>
                    </span>
                {{item}}
            </li>
        </ul>
    </section>

</ng-template>
